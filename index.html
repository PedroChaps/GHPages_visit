<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <title>My Travel & Availability Calendar</title>

  <style>
    :root {
      --bg: #0f172a;
      --panel: #020617;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #38bdf8;
      --border: #1e293b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: linear-gradient(180deg, #020617, #020617);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 1.2rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: rgba(2, 6, 23, 0.9);
      backdrop-filter: blur(6px);
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    h1 {
      font-size: 1.25rem;
      margin: 0;
      font-weight: 600;
    }

    .location {
      font-size: 0.9rem;
      color: var(--muted);
    }

    .lang-toggle {
      display: flex;
      gap: 0.4rem;
    }

    .lang-toggle button {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 0.35rem 0.6rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
    }

    .lang-toggle button.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #020617;
      font-weight: 600;
    }

    .intro {
      margin-top: 0.75rem;
      font-size: 0.95rem;
      line-height: 1.4;
      color: var(--text);
      max-width: 900px;
    }

    main {
      flex: 1;
      padding: 0.6rem;
    }

    .calendar-wrapper {
      width: 100%;
      height: calc(100vh - 170px);
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: black;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    footer {
      padding: 0.6rem;
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 600px) {
      .calendar-wrapper {
        height: calc(100vh - 210px);
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="top-row">
      <div>
        <h1 id="title">My Travel & Availability Calendar</h1>
        <div class="location">
          <span id="location-label">Currently settled in:</span>
          <strong id="location">Lisbon, Portugal</strong>
        </div>
      </div>

      <div class="lang-toggle">
        <button id="btn-en" class="active" onclick="setLang('en')">EN 🇬🇧</button>
        <button id="btn-pt" onclick="setLang('pt')">PT 🇵🇹</button>
      </div>
    </div>

    <div id="intro" class="intro"></div>
  </header>

  <main>
    <div class="calendar-wrapper">
      <iframe 
        src="https://calendar.google.com/calendar/embed?showTitle=0&showPrint=0&showCalendars=0&showTz=0&mode=MONTH&src=03f0d19432c1573d3c39e367e320329d9ffbc67321cc70d9e9014f8973eb27dd%40group.calendar.google.com">
      </iframe>
    </div>
  </main>

  <script>
    const texts = {
        en: {
            title: "Chaps' Travel & Availability Calendar",
            locationLabel: "Currently settled in:",
            location: "London, UK 🇬🇧",
            intro: "Hi! 😃 This calendar shows all my planned travels. If nothing is scheduled, I'll most likely be in my settled location. Please confirm availability with me before planning any visit. Ideally your visit includes the weekend as I'll be working during the week. Thanks!"
        },
        pt: {
            title: "Calendário de Viagens & Disponibilidade do Chaps",
            locationLabel: "Atualmente baseado em:",
            location: "Londres, Reino Unido 🇬🇧",
            intro: "Olá! 😃 Este calendário mostra todas as minhas viagens planeadas. Se não houver nada marcado, provavelmente estarei na minha localização base. Por favor confirma sempre a disponibilidade comigo antes de planeares qualquer visita. Idealmente a tua visita inclui o fim de semana, pois durante a semana estarei a trabalhar. Obrigado!"
        }
    };

    function setLang(lang) {
      document.getElementById("title").textContent = texts[lang].title;
      document.getElementById("location-label").textContent = texts[lang].locationLabel;
      document.getElementById("location").textContent = texts[lang].location;
      document.getElementById("intro").textContent = texts[lang].intro;

      document.getElementById("btn-en").classList.toggle("active", lang === "en");
      document.getElementById("btn-pt").classList.toggle("active", lang === "pt");
    }

    setLang("en");
  </script>

</body>
</html>
